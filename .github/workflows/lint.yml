name: Lint

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint Go code
    runs-on: actions-runner-kube-niggl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
